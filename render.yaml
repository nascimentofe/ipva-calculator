services:
  - type: web
    name: ipva-calculator
    runtime: static
    repo: https://github.com/nascimentofe/ipva-calculator
    branch: main
    autoDeploy: true
    buildCommand: chmod +x build.sh && ./build.sh
    staticPublishPath: .
    envVars:
      - key: GA_MEASUREMENT_ID
        sync: false
      - key: CLARITY_ID
        sync: false
      - key: ADSENSE_PUB_ID
        sync: false
      - key: AD_SLOT_TOP
        sync: false
      - key: AD_SLOT_LEFT
        sync: false
      - key: AD_SLOT_RIGHT
        sync: false
      - key: AD_SLOT_IN_ARTICLE
        sync: false
      - key: AD_SLOT_BOTTOM
        sync: false
    domains:
      - ipva.fsncompany.com.br
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /style.css
        name: Cache-Control
        value: public, max-age=86400
      - path: /script.js
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

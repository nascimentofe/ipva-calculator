services:
  - type: web
    name: ipva-calculator
    runtime: static
    repo: https://github.com/nascimentofe/ipva-calculator
    branch: main
    autoDeploy: true
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: .
    domains:
      - ipva.fsncompany.com.br
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /style.css
        name: Cache-Control
        value: public, max-age=86400
      - path: /script.js
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
